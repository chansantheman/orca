name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec oxlint --format github

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    uses: ./.github/workflows/e2e.yml
    # Why: check out the PR head directly instead of refs/pull/N/merge.
    # The merge ref doesn't exist when the PR has conflicts or GitHub
    # hasn't computed the merge commit yet, causing checkout to fail
    # for reasons unrelated to the code under test.
    with:
      ref: ${{ github.event.pull_request.head.sha }}
